<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Variable Color Matcher</title>
  <link rel="stylesheet" href="src/styles/popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>CSS Variable Color Matcher</h1>
      <button id="popout-btn" type="button" title="Open in window" aria-label="Open in window"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6m4-1h6v6m-11 5L21 2"/></svg></button>
    </div>
    <div id="controls">
      <button id="scan-btn" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M5 21v-4.5h1V20h12v-3.5h1V21zm0-9.5V3h9.5L19 7.5v4h-1V8h-4V4H6v7.5zm-3.423 3v-1h20.846v1zM12 16.5"/></svg> <span id="scan-btn-text">Scan Page Variables</span></button>
      <button id="pick-btn" type="button" aria-label="Pick color from page"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16"><path fill="currentColor" fill-rule="evenodd" d="M12.9.514a1.753 1.753 0 0 1 2.48 0l.15.15c.685.685.685 1.79 0 2.48l-2.32 2.32l.478.479l.102.114c.48.589.446 1.46-.102 2.01l-.586.586c-.54.54-1.39.581-1.98.126l-5.21 5.21a2.72 2.72 0 0 1-1.96.795l-.661.662c-.697.697-1.8.74-2.55.131l-.145-.131a1.9 1.9 0 0 1 0-2.69l.661-.663a2.7 2.7 0 0 1 .797-1.96l5.21-5.21a1.49 1.49 0 0 1 .127-1.97l.586-.586l.114-.103a1.504 1.504 0 0 1 2.01.103l.478.478l2.32-2.32zm-10.1 10.3c-.37.37-.536.865-.501 1.35a.6.6 0 0 1-.155.473l-.803.804a.906.906 0 0 0 1.28 1.28l.802-.803a.6.6 0 0 1 .474-.155c.484.036.979-.129 1.35-.499l5.2-5.2l-2.44-2.44l-5.2 5.2z" clip-rule="evenodd"/></svg> Pick Color</button>
    </div>
    <div id="save-controls">
      <input id="list-name" type="text" placeholder="List name...">
      <button id="save-btn" type="button" aria-label="Save current variables as list"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M21 7v12q0 .825-.587 1.413T19 21H5q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h12zm-2 .85L16.15 5H5v14h14zm-4.875 9.275Q15 16.25 15 15t-.875-2.125T12 12t-2.125.875T9 15t.875 2.125T12 18t2.125-.875M6 10h9V6H6zM5 7.85V19V5z"/></svg> Save</button>
    </div>
    <div id="saved-lists"></div>
    <details id="variables">
      <summary id="vars-summary">Color Variables</summary>
      <div id="vars-search-wrapper">
        <svg class="vars-search-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="10" cy="10" r="7"/><path d="m15 15l6 6"/></g></svg>
        <input id="vars-search" type="text" placeholder="Search variables...">
      </div>
      <div id="vars-list">
        <p id="no-vars-msg">No variables scanned yet.</p>
      </div>
    </details>
    <div id="results">
      <p id="no-color-msg">No color picked yet. Click the button above to start.</p>
    </div>
  </div>
  <script type="module" src="dist/entries/popup/index.js"></script>
</body>
</html>
